name: checks

on:
  push:
  pull_request:

jobs:
  protocol:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node --test .\tests\protocol.test.ts
      - shell: pwsh
        run: .\scripts\build-release.ps1

name: checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  protocol:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: node --test .\tests\protocol.test.ts
      - shell: pwsh
        run: .\scripts\build-release.ps1
